version: '3.8'

services:
  app:
    image: webdevops/php-nginx:8.4
    volumes:
      - .:/app
    environment:
      - WEB_DOCUMENT_ROOT=/app/public
    ports:
      - "8000:80"

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
